apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: backstage
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure 
spec:
  tls:
  - hosts:
    - backstage.local
    secretName: backstage-tls

  rules:
    - host: backstage.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: 80